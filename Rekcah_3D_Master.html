<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REKCAH: Industrial Simulation (Master Build)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #canvas-container { position: absolute; width: 100%; height: 100%; }
        .hud { position: absolute; top: 50px; left: 50px; background: rgba(0,0,0,0.85); padding: 25px; border-left: 5px solid #38bdf8; backdrop-filter: blur(20px); border-radius: 0 10px 10px 0; color: #38bdf8; box-shadow: 0 0 30px rgba(56, 189, 248, 0.2); pointer-events: none; }
        .controls { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; }
        .btn { background: #38bdf8; color: #000; border: none; padding: 18px 45px; font-weight: 900; letter-spacing: 3px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); }
        .btn:hover { background: #fff; transform: scale(1.15) translateY(-5px); box-shadow: 0 10px 40px rgba(56, 189, 248, 0.6); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="hud">
        <h1 style="margin:0; font-size: 38px; text-shadow: 0 0 20px #38bdf8;">REKCAH LAB</h1>
        <p style="color: #94a3b8; margin: 10px 0 0 0; font-size: 14px; letter-spacing: 2px;">CONTINUOUS SIMULATION | [SYSTEM: 9ROUTER LIVE]</p>
    </div>
    <div class="controls">
        <button class="btn" onclick="deal()">RESET SIM</button>
        <button class="btn" style="background: #fbbf24;">SHOW CALL</button>
    </div>

    <!-- Three.js + Post-Processing Shaders -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- UNREAL BLOOM PIPELINE ---
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.21;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.55;

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- ATMOSPHERIC RIG ---
        const tableGeo = new THREE.PlaneGeometry(100, 100);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1, metalness: 0.8 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.rotation.x = -Math.PI / 2;
        table.position.y = -5;
        scene.add(table);

        const pointLight = new THREE.PointLight(0x38bdf8, 5, 100);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        const amberLight = new THREE.PointLight(0xfbbf24, 2, 100);
        amberLight.position.set(-15, 5, 0);
        scene.add(amberLight);

        // --- HIGH-FIDELITY CARD ENGINE ---
        const cards = [];
        function createCard(i) {
            const cardGroup = new THREE.Group();
            
            // Physical Geometry
            const cardGeo = new THREE.BoxGeometry(2.8, 4.0, 0.08);
            const cardMat = new THREE.MeshStandardMaterial({ 
                color: 0x1e293b,
                emissive: 0x38bdf8,
                emissiveIntensity: 0.4 
            });
            const mesh = new THREE.Mesh(cardGeo, cardMat);
            cardGroup.add(mesh);

            // Neon Pulse Border
            const wireGeo = new THREE.EdgesGeometry(cardGeo);
            const wireMat = new THREE.LineBasicMaterial({ color: 0x38bdf8, linewidth: 2 });
            const line = new THREE.LineSegments(wireGeo, wireMat);
            cardGroup.add(line);

            cardGroup.position.set(i * 3.5 - 8.75, -2, 5);
            cardGroup.rotation.x = -0.5;
            scene.add(cardGroup);
            return cardGroup;
        }

        for(let i=0; i<6; i++) cards.push(createCard(i));

        camera.position.set(0, 12, 18);
        camera.lookAt(0, -2, 0);

        // Mouse Parallax Engine
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.01;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.01;
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Cinematic Camera Motion
            camera.position.x += (mouseX - camera.position.x) * 0.08;
            camera.position.y += (-mouseY + 12 - camera.position.y) * 0.08;
            camera.lookAt(0, -2, 0);

            // Balatro Card Wobble
            cards.forEach((c, i) => {
                c.rotation.y = Math.sin(Date.now() * 0.002 + i) * 0.15;
                c.rotation.z = Math.cos(Date.now() * 0.001 + i) * 0.08;
                c.position.y = -2 + Math.sin(Date.now() * 0.003 + i) * 0.25;
            });

            composer.render();
        }
        animate();

        function deal() {
            cards.forEach((c, i) => {
                c.position.y = 20;
                setTimeout(() => {
                    // Logic for dealing animation would go here
                }, i * 100);
            });
        }
    </script>
</body>
</html>
